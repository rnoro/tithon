# Project-level Codex overrides for Tithon (loads because /workspace/tithon is a trusted
# project in ~/.codex/config.toml). See .claude/CLAUDE.md "Codex (GPT-5.6) second opinion"
# and ADR-073.
#
# Why this file exists: /codex:review and /codex:adversarial-review accept NO --model/--effort
# flags, so config is the ONLY way to control them. Trigger ② (pre-milestone-commit diff
# cross-review) wants terra/high; without this it would silently run at the user default
# `medium`.
#
# `model` MUST be set explicitly. Verified: with no --model the run resolves to gpt-5.6-sol even
# though ~/.codex/config.toml sets model = "gpt-5.6-terra" — the user-level model does NOT get
# inherited here, and the bare default falls back to Sol. Leaving this unset would make the
# flagless /codex:review run Sol+high, the most expensive combination.
#
# Triggers ① and ④ pass an explicit --model/--effort through codex:codex-rescue and override
# whatever is set here.

model = "gpt-5.6-terra"
model_reasoning_effort = "high"
